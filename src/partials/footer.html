{{#if simpleMode}} {{> footer-simple}} {{else}}
<footer class="mt-16 border-t border-gray-200 py-8 bg-white">
  <div class="max-w-[1280px] mx-auto px-[1.25rem]">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 text-center md:text-left">
      <div class="mb-8 md:mb-0">
        <div class="flex items-center justify-center md:justify-start mb-4">
          <img id="footer-logo" src="{{baseUrl}}{{#if brandLogo}}{{brandLogo}}{{else}}images/favicon.svg{{/if}}"
            alt="{{#if brandName}}{{brandName}}{{else}}LocalPDF{{/if}} Logo" class="h-10 w-10 mr-3" />
          <span id="footer-brand" class="text-xl font-bold text-gray-900">{{#if brandName}}{{brandName}}{{else}}LocalPDF{{/if}}</span>
        </div>
        <p id="footer-copyright" class="text-gray-500 text-sm">
          &copy; 2026 LocalPDF. All rights reserved.
        </p>
        <p class="text-gray-400 text-xs mt-1">
          Based on <a href="https://github.com/jacksnotes/LocalPDF" target="_blank" rel="noopener noreferrer" class="hover:text-indigo-600 underline">LocalPDF</a> (AGPL-3.0).
        </p>
      </div>

      <div>
        <h3 class="font-bold text-gray-900 mb-4" data-i18n="footer.company">Company</h3>
        <ul class="space-y-2">
          <li><a href="about.html" class="text-gray-500 hover:text-indigo-600 text-sm" data-i18n="footer.aboutUs">About Us</a></li>
          <li><a href="contact.html" class="text-gray-500 hover:text-indigo-600 text-sm" data-i18n="footer.contactUs">Contact Us</a></li>
        </ul>
      </div>

      <div>
        <h3 class="font-bold text-gray-900 mb-4" data-i18n="footer.legal">Legal</h3>
        <ul class="space-y-2">
          <li><a href="terms.html" class="text-gray-500 hover:text-indigo-600 text-sm" data-i18n="footer.termsAndConditions">Terms of Service</a></li>
          <li><a href="privacy.html" class="text-gray-500 hover:text-indigo-600 text-sm" data-i18n="footer.privacyPolicy">Privacy Policy</a></li>
          <li><a href="wasm-settings.html" class="text-gray-500 hover:text-indigo-600 text-sm" data-i18n="settings.advancedSettings">Advanced Settings</a></li>
        </ul>
      </div>
    </div>
  </div>
</footer>
{{/if}}
