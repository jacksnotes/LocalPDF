<footer class="mt-16 border-t-2 border-gray-700 py-8" data-simple-footer="true">
  <div class="max-w-[1280px] mx-auto px-[1.25rem]">
    <div class="flex items-center justify-between flex-wrap gap-4">
      <div>
        <div class="flex items-center mb-2">
          <img id="footer-logo" src="{{baseUrl}}{{#if brandLogo}}{{brandLogo}}{{else}}images/favicon.svg{{/if}}"
            alt="{{#if brandName}}{{brandName}}{{else}}Local PDF{{/if}} Logo" class="h-8 w-8 mr-2" />
          <span id="footer-brand" class="text-white font-bold text-lg">{{#if
            brandName}}{{brandName}}{{else}}LocalPDF{{/if}}</span>
        </div>
        <p id="footer-copyright" class="text-gray-400 text-sm">
          {{#if footerText}}{{footerText}}{{else}}&copy; 2026 LocalPDF. All rights reserved.{{/if}}
        </p>
        <p class="text-gray-500 text-xs mt-1">
          Based on <a href="https://github.com/alam00000/bentopdf" target="_blank" rel="noopener noreferrer" class="hover:text-indigo-400 underline">BentoPDF</a> (AGPL-3.0).
        </p>
      </div>
      <div id="simple-mode-lang-switcher" class="flex-shrink-0"></div>
    </div>
  </div>
</footer>
